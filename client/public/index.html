<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Real-time Collaborative Whiteboard - Draw, brainstorm, and collaborate with your team in real-time."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      The manifest.json file provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Collaborative Whiteboard</title>
    <!--
      Preload the main CSS file for better performance.
      This assumes the main.css is generated by the build process and placed in the public folder.
      In a typical Create React App setup, styles are imported directly into JS,
      but for a more explicit HTML structure, we can link it here if needed,
      or rely on the JS bundle to inject styles. For this project,
      we'll assume client/src/styles/main.css is bundled and injected by React.
      However, if there were global styles not tied to React components, they could be linked here.
    -->
    <!-- <link rel="stylesheet" href="%PUBLIC_URL%/static/css/main.css" /> -->
  </head>
